<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aardvark — Partner Logo Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#171614;   /* booklet cover */
    --charcoal2:#20211f;
    --teal:#309F98;       /* Aardvark signature teal */
    --teal-lt:#4FBEB6;
    --paper:#F4F3EF;      /* warm off-white card */
    --accent:var(--teal);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:'Montserrat',system-ui,sans-serif;}
  #stage{
    position:relative;width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(130% 130% at 50% 25%, #24231f 0%, var(--charcoal) 55%, #0c0b0a 100%);
    overflow:hidden;
  }
  /* teal glow */
  #glow{
    position:absolute;width:85vmin;height:85vmin;border-radius:50%;
    filter:blur(100px);opacity:.30;background:var(--teal);
    transition:background 1.1s ease, transform 6s ease-in-out;pointer-events:none;
  }
  /* fine engineering grid, brand-subtle */
  #grid{
    position:absolute;inset:0;opacity:.045;pointer-events:none;
    background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
    background-size:64px 64px;
    mask:radial-gradient(circle at 50% 45%,#000 25%,transparent 72%);
    -webkit-mask:radial-gradient(circle at 50% 45%,#000 25%,transparent 72%);
  }
  /* thin teal frame like the booklet layout rules */
  #frame{position:absolute;inset:26px;border:1px solid rgba(48,159,152,.28);
    border-radius:4px;pointer-events:none;z-index:4;}
  #frame::before,#frame::after{content:"";position:absolute;width:26px;height:26px;
    border:2px solid var(--teal);}
  #frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  #frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}

  .card{
    position:absolute;display:flex;align-items:center;justify-content:center;
    width:min(54vw,600px);height:min(33vh,300px);border-radius:6px;
    opacity:0;
    box-shadow:0 34px 90px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05) inset;
  }
  .card.light{background:linear-gradient(180deg,#ffffff,var(--paper));}
  .card.dark{background:linear-gradient(180deg,#242521,#141412);
    box-shadow:0 34px 90px rgba(0,0,0,.6),0 0 0 1px rgba(48,159,152,.22) inset;}
  /* teal accent tab on each card, booklet-style */
  .card::before{content:"";position:absolute;left:0;top:22px;bottom:22px;width:5px;
    background:var(--teal);border-radius:3px;}
  .card img{max-width:74%;max-height:66%;object-fit:contain;}
  .card .nm{
    position:absolute;bottom:-46px;left:0;right:0;text-align:center;
    color:#EDECE7;font-size:15px;letter-spacing:5px;text-transform:uppercase;font-weight:600;
    opacity:0;transform:translateY(8px);
  }
  .card .nm b{color:var(--teal-lt);font-weight:700;}
  @keyframes inCard{
    0%{opacity:0;transform:translateY(46px) scale(.90);filter:blur(7px);}
    100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
  }
  @keyframes outCard{
    0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
    100%{opacity:0;transform:translateY(-36px) scale(1.05);filter:blur(7px);}
  }
  @keyframes inName{to{opacity:.9;transform:translateY(0);}}
  .card.show{animation:inCard .85s cubic-bezier(.19,1,.22,1) forwards;}
  .card.show .nm{animation:inName .7s ease .3s forwards;}
  .card.hide{animation:outCard .55s cubic-bezier(.55,0,.55,.2) forwards;}

  /* intro / outro */
  #intro,#outro{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;color:#fff;z-index:5;
  }
  #outro{opacity:0;pointer-events:none;}
  .kicker{font-size:clamp(11px,1.5vw,15px);letter-spacing:10px;text-transform:uppercase;
    color:var(--teal-lt);font-weight:600;margin-bottom:22px;}
  .title{font-size:clamp(32px,7vw,84px);font-weight:800;letter-spacing:1px;color:#fff;line-height:1;}
  .title .t{color:var(--teal);}
  .rule{width:0;height:2px;background:var(--teal);margin:26px auto 0;}
  .sub{margin-top:22px;font-size:clamp(12px,1.6vw,18px);letter-spacing:7px;
    text-transform:uppercase;color:#9a9a92;font-weight:400;}
  .fade-in{animation:fadeIn 1s ease forwards;}
  .fade-out{animation:fadeOut .8s ease forwards;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
  @keyframes growRule{to{width:min(260px,40vw);}}

  #bar{position:absolute;left:0;bottom:0;height:3px;width:0;background:var(--teal);
    z-index:6;box-shadow:0 0 14px var(--teal);}
</style>
</head>
<body>
<div id="stage">
  <div id="grid"></div>
  <div id="glow"></div>
  <div id="frame"></div>

  <div id="intro">
    <div class="kicker fade-in">Aardvark Technologies</div>
    <div class="title fade-in" style="animation-delay:.15s;opacity:0;">Our <span class="t">Partners</span></div>
    <div class="rule" style="animation:growRule 1s ease .6s forwards;"></div>
    <div class="sub fade-in" style="animation-delay:.5s;opacity:0;">The collective edge in gaming</div>
  </div>

  <div id="outro">
    <div class="kicker">Aardvark · ADV.BET</div>
    <div class="title">Stronger <span class="t">Together</span></div>
    <div class="rule" style="width:min(260px,40vw);"></div>
    <div class="sub">One platform · Many partners</div>
  </div>

  <div id="bar"></div>
</div>
